<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>جاري التحميل - ZIARA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', 'Segoe UI', sans-serif;
      background: #060d18;
      color: #e8f0fe;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;
      text-align: center;
      direction: rtl;
      padding: 24px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(0,212,170,0.15);
      border-top-color: #00d4aa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; }
    p { color: #8ba3c7; font-size: 0.95rem; line-height: 1.7; }
    .files { margin-top: 24px; display: flex; flex-direction: column; gap: 8px; }
    .file { color: #4a6080; font-size: 0.85rem; font-family: monospace; }
    .file.done { color: #00d4aa; }
    .sep { color: #4a6080; margin: 0 6px; }
    .back { margin-top: 40px; }
    .back a { color: #8ba3c7; font-size: 0.9rem; text-decoration: none; border: 1px solid rgba(0,212,170,0.2); padding: 10px 24px; border-radius: 50px; transition: all 0.3s; }
    .back a:hover { border-color: #00d4aa; color: #00d4aa; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h2>جاري التحميل…</h2>
  <p>سيبدأ تحميل الملفات الثلاثة تلقائياً</p>
  <div class="files" id="status">
    <span class="file" id="s0">⏳ Ziara.DR.zip</span>
    <span class="file" id="s1">⏳ Ziara.SEC.zip</span>
    <span class="file" id="s2">⏳ Ziara.Server.zip</span>
  </div>
  <div class="back"><a href="/">← العودة للصفحة الرئيسية</a></div>

  <script>
    const URLS = [
      'https://github.com/221008874/client-/releases/download/Ziara/DR_1.4.0.zip',
      'https://github.com/221008874/client-/releases/download/Ziara/SEC_1.4.0.zip',
      'https://github.com/221008874/client-/releases/download/Ziara/Server_1.4.0.zip',
    ];

    URLS.forEach((url, i) => {
      setTimeout(() => {
        const a = document.createElement('a');
        a.href = url;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        document.getElementById('s' + i).className = 'file done';
        document.getElementById('s' + i).textContent = '✓ ' + URLS[i].split('/').pop();
      }, i * 2500);
    });
  </script>
</body>
</html>
